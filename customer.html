<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>掃描商品 QR</title>
  <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
  <style>
    :root {
      --bg: #071019;
      --panel: #101a25;
      --panel2: #172536;
      --text: #edf6ff;
      --muted: #96a8bb;
      --line: #2a3a50;
      --accent: #22b8ff;
      --ok: #45d48d;
      --warn: #ffcc66;
      --bad: #ff7070;
      --shade: rgba(0, 0, 0, .58);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    .app {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .camera-card {
      position: relative;
      overflow: hidden;
      min-height: 72vh;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #02060a;
    }

    #camera {
      width: 100%;
      height: 72vh;
      object-fit: cover;
      display: block;
      background: #02060a;
    }

    .scan-ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scan-mask {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(var(--shade), var(--shade)) top / 100% calc(var(--box-top) * 1px) no-repeat,
        linear-gradient(var(--shade), var(--shade)) left calc(var(--box-top) * 1px) / calc(var(--box-left) * 1px) calc(var(--box-size) * 1px) no-repeat,
        linear-gradient(var(--shade), var(--shade)) right calc(var(--box-top) * 1px) / calc(100% - (var(--box-left) + var(--box-size)) * 1px) calc(var(--box-size) * 1px) no-repeat,
        linear-gradient(var(--shade), var(--shade)) bottom / 100% calc(100% - (var(--box-top) + var(--box-size)) * 1px) no-repeat;
    }

    .scan-box {
      position: absolute;
      left: calc(var(--box-left) * 1px);
      top: calc(var(--box-top) * 1px);
      width: calc(var(--box-size) * 1px);
      height: calc(var(--box-size) * 1px);
      border: 4px solid #fff;
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .28), 0 0 20px rgba(34, 184, 255, .34);
    }

    .scan-box::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      height: 2px;
      background: rgba(34, 184, 255, .75);
    }

    .guide {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(16, 26, 37, .9);
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
    }

    .message {
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel2);
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .message.ok {
      color: var(--ok);
      border-color: rgba(69, 212, 141, .45);
    }

    .message.warn {
      color: var(--warn);
      border-color: rgba(255, 204, 102, .45);
    }

    .message.bad {
      color: var(--bad);
      border-color: rgba(255, 112, 112, .45);
    }

    .panel {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .product-preview {
      display: grid;
      gap: 10px;
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #02060a;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      padding: 14px;
      text-align: center;
    }

    .product-image {
      width: 100%;
      max-height: 330px;
      object-fit: contain;
      border-radius: 8px;
      background: #05080c;
    }

    .product-title {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
      text-align: left;
    }

    .product-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      text-align: left;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel2);
      padding: 10px;
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta-value {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    button,
    a.button {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      padding: 13px 14px;
      background: var(--accent);
      color: #03131d;
      font: inherit;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      background: var(--panel2);
      border: 1px solid var(--line);
    }

    textarea {
      width: 100%;
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #0d1621;
      color: var(--muted);
      font: inherit;
      resize: vertical;
      word-break: break-all;
      outline: none;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 390px) {
      .app {
        padding: 8px;
      }

      #camera,
      .camera-card {
        min-height: 70vh;
        height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>掃描商品 QR</h1>
      <div class="pill" id="mode">掃商品碼</div>
    </div>

    <section class="camera-card" id="camera-card">
      <video id="camera" playsinline muted autoplay></video>

      <div id="scan-ui" class="scan-ui">
        <div class="scan-mask"></div>
        <div class="scan-box"></div>
        <div class="guide">請把標籤左下角淘寶商品 QR 放進白框。右下角保險 QR 不要放進框內。</div>
      </div>
    </section>

    <div id="message" class="message">正在啟動相機...</div>

    <section id="result-panel" class="panel hidden">
      <div id="product-preview" class="product-preview">已掃到商品連結。商品圖片需要後端擷取，現在可先點下方按鈕開啟商品頁。</div>
      <a id="open-link" class="button" href="#" target="_self" rel="noopener">打開商品頁</a>
      <button id="rescan-btn" class="secondary" type="button">重新掃描</button>
      <textarea id="result-url" readonly></textarea>
    </section>

    <section id="fallback-panel" class="panel hidden">
      <button id="start-btn" type="button">啟動相機</button>
    </section>
  </main>

  <canvas id="work-canvas" class="hidden"></canvas>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWWBupdwuar1EvO0qsXAehBawmt_TQk7faI9mYaNdBT6bWwFxqiEOJD5xwWWLVikWy/exec";

    const cameraCard = document.getElementById("camera-card");
    const camera = document.getElementById("camera");
    const mode = document.getElementById("mode");
    const message = document.getElementById("message");
    const resultPanel = document.getElementById("result-panel");
    const fallbackPanel = document.getElementById("fallback-panel");
    const startBtn = document.getElementById("start-btn");
    const rescanBtn = document.getElementById("rescan-btn");
    const openLink = document.getElementById("open-link");
    const resultUrl = document.getElementById("result-url");
    const canvas = document.getElementById("work-canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    let stream = null;
    let scanTimer = null;
    let lastRejectAt = 0;
    let hasResult = false;

    startBtn.addEventListener("click", startCamera);
    rescanBtn.addEventListener("click", resetScan);
    window.addEventListener("load", startCamera);
    window.addEventListener("resize", updateScanBox);
    window.addEventListener("pagehide", stopCamera);
    document.addEventListener("visibilitychange", function() {
      if (document.hidden) stopCamera();
    });

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message" + (type ? " " + type : "");
    }

    function isTaobaoLink(value) {
      const text = String(value || "").trim().toLowerCase();
      return text.includes("taobao.com") ||
        text.includes("item.taobao") ||
        text.includes("m.tb.cn") ||
        text.includes("tb.cn") ||
        text.includes("tmall.com");
    }

    async function startCamera() {
      stopCamera();
      hasResult = false;
      mode.textContent = "掃商品碼";
      resultPanel.classList.add("hidden");
      fallbackPanel.classList.add("hidden");
      showMessage("正在啟動相機...", "");

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        camera.srcObject = stream;
        await camera.play();
        updateScanBox();
        startScanLoop();
        showMessage("請掃左下角淘寶商品 QR", "");
      } catch (error) {
        console.error(error);
        fallbackPanel.classList.remove("hidden");
        showMessage("相機啟動失敗，請確認瀏覽器相機權限，並用 HTTPS 開啟頁面。", "bad");
      }
    }

    function stopCamera() {
      stopScanLoop();

      if (stream) {
        stream.getTracks().forEach(function(track) {
          track.stop();
        });
        stream = null;
      }

      camera.srcObject = null;
    }

    function startScanLoop() {
      stopScanLoop();
      scanTimer = window.setInterval(scanLeftBox, 240);
    }

    function stopScanLoop() {
      if (scanTimer) {
        window.clearInterval(scanTimer);
        scanTimer = null;
      }
    }

    function updateScanBox() {
      const rect = cameraCard.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const size = Math.round(Math.min(rect.width * 0.42, rect.height * 0.32, 230));
      const left = Math.round(rect.width * 0.08);
      const top = Math.round(rect.height * 0.53);

      cameraCard.style.setProperty("--box-size", size);
      cameraCard.style.setProperty("--box-left", left);
      cameraCard.style.setProperty("--box-top", top);
    }

    function getScanBoxCss() {
      return {
        left: parseFloat(cameraCard.style.getPropertyValue("--box-left")) || 0,
        top: parseFloat(cameraCard.style.getPropertyValue("--box-top")) || 0,
        size: parseFloat(cameraCard.style.getPropertyValue("--box-size")) || 180
      };
    }

    function scanLeftBox() {
      if (hasResult || !camera.videoWidth || !camera.videoHeight) return;

      const cardRect = cameraCard.getBoundingClientRect();
      const videoRect = camera.getBoundingClientRect();
      const box = getScanBoxCss();

      const videoRatio = camera.videoWidth / camera.videoHeight;
      const elementRatio = videoRect.width / videoRect.height;

      let drawnWidth;
      let drawnHeight;
      let offsetX = 0;
      let offsetY = 0;

      if (videoRatio > elementRatio) {
        drawnHeight = videoRect.height;
        drawnWidth = drawnHeight * videoRatio;
        offsetX = (videoRect.width - drawnWidth) / 2;
      } else {
        drawnWidth = videoRect.width;
        drawnHeight = drawnWidth / videoRatio;
        offsetY = (videoRect.height - drawnHeight) / 2;
      }

      const boxLeftInVideo = box.left + cardRect.left - videoRect.left;
      const boxTopInVideo = box.top + cardRect.top - videoRect.top;

      const sx = Math.max(0, Math.round((boxLeftInVideo - offsetX) * camera.videoWidth / drawnWidth));
      const sy = Math.max(0, Math.round((boxTopInVideo - offsetY) * camera.videoHeight / drawnHeight));
      const sw = Math.min(camera.videoWidth - sx, Math.round(box.size * camera.videoWidth / drawnWidth));
      const sh = Math.min(camera.videoHeight - sy, Math.round(box.size * camera.videoHeight / drawnHeight));

      if (sw <= 0 || sh <= 0) return;

      canvas.width = sw;
      canvas.height = sh;
      ctx.drawImage(camera, sx, sy, sw, sh, 0, 0, sw, sh);

      const imageData = ctx.getImageData(0, 0, sw, sh);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "dontInvert"
      });

      if (!code || !code.data) return;

      const scanned = String(code.data).trim();

      if (!isTaobaoLink(scanned)) {
        const now = Date.now();
        if (now - lastRejectAt > 1000) {
          lastRejectAt = now;
          showMessage("這不是淘寶商品 QR，請掃左下角商品碼", "warn");
        }
        return;
      }

      showResult(scanned);
    }

    function showResult(url) {
      hasResult = true;
      stopCamera();
      mode.textContent = "已掃到";
      openLink.href = url;
      resultUrl.value = url;
      resultPanel.classList.remove("hidden");
      showMessage("已掃到淘寶商品連結，正在查詢商品資料。", "ok");
      renderLoading();
      lookupProduct(url);
    }

    function renderLoading() {
      document.getElementById("product-preview").innerHTML = "正在查詢商品資料...";
    }

    function lookupProduct(url) {
      const callbackName = "lookupCallback_" + Date.now();
      const script = document.createElement("script");

      window[callbackName] = function(data) {
        delete window[callbackName];
        script.remove();
        renderProduct(data, url);
      };

      script.onerror = function() {
        delete window[callbackName];
        script.remove();
        renderLookupError(url);
      };

      script.src = APPS_SCRIPT_URL +
        "?action=lookup" +
        "&callback=" + encodeURIComponent(callbackName) +
        "&productUrl=" + encodeURIComponent(url);

      document.body.appendChild(script);
    }

    function renderProduct(data, fallbackUrl) {
      const preview = document.getElementById("product-preview");

      if (!data || data.status === "error") {
        renderLookupError(fallbackUrl, data && data.message ? data.message : "");
        return;
      }

      if (!data.found || data.customerDisplayStatus !== "可展示") {
        preview.innerHTML =
          "<div class=\"product-title\">商品資料整理中</div>" +
          "<div>我們已取得商品連結，但商品圖片、名稱或價格尚未整理完成。</div>";
        showMessage("商品資料整理中，可先用下方按鈕打開商品頁。", "warn");
        return;
      }

      const imageUrl = getDisplayImageUrl(data);
      const fallbackImageUrl = getFallbackImageUrl(data);
      const imageHtml = imageUrl
        ? "<img class=\"product-image\" src=\"" + escapeAttr(imageUrl) + "\" data-fallback-src=\"" + escapeAttr(fallbackImageUrl) + "\" alt=\"商品圖片\" onerror=\"handleProductImageError(this)\">"
        : "<div>尚無商品圖片</div>";

      preview.innerHTML =
        imageHtml +
        "<div class=\"product-title\">" + escapeHtml(data.productName || "商品") + "</div>" +
        "<div class=\"product-meta\">" +
          metaBox("價格", data.originalPrice || data.suggestedPrice || "未整理") +
          metaBox("規格", data.spec || "未整理") +
          metaBox("品類", data.category || "未整理") +
          metaBox("狀態", data.itemStatus || "未整理") +
        "</div>";

      showMessage("已找到商品資料。", "ok");
    }

    function getDisplayImageUrl(data) {
      if (data && data.productImageFileId) {
        return "https://drive.google.com/thumbnail?id=" + encodeURIComponent(data.productImageFileId) + "&sz=w1000";
      }

      return data && data.productImageUrl ? data.productImageUrl : "";
    }

    function getFallbackImageUrl(data) {
      if (data && data.productImageUrl) {
        return data.productImageUrl;
      }

      if (data && data.productImageFileId) {
        return "https://drive.google.com/uc?export=view&id=" + encodeURIComponent(data.productImageFileId);
      }

      return "";
    }

    function handleProductImageError(img) {
      const fallback = img.getAttribute("data-fallback-src");

      if (fallback && img.src !== fallback) {
        img.removeAttribute("data-fallback-src");
        img.src = fallback;
        return;
      }

      img.outerHTML = "<div>商品圖片暫時無法顯示</div>";
    }

    function renderLookupError(url, messageText) {
      document.getElementById("product-preview").innerHTML =
        "<div class=\"product-title\">暫時查不到商品資料</div>" +
        "<div>" + escapeHtml(messageText || "請稍後再試，或用下方按鈕打開商品頁。") + "</div>";
      showMessage("查詢商品資料失敗，可先打開商品頁。", "warn");
    }

    function metaBox(label, value) {
      return "<div class=\"meta-box\">" +
        "<div class=\"meta-label\">" + escapeHtml(label) + "</div>" +
        "<div class=\"meta-value\">" + escapeHtml(value) + "</div>" +
      "</div>";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function resetScan() {
      openLink.href = "#";
      resultUrl.value = "";
      startCamera();
    }
  </script>
</body>
</html>
